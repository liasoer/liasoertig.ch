<script>
  // Set the theme before first paint so page navigation never flashes the
  // light-theme background for a frame — the same logic main.js uses.
  (function(){
    try {
      var t = localStorage.getItem("lo-theme") || "dark";
      document.documentElement.setAttribute("data-theme", t);
    } catch(e){
      document.documentElement.setAttribute("data-theme", "dark");
    }
  })();
</script>
